[tools]
python = "3.14.6"
uv = "0.11.25"

[env]
_.python.venv = { path = ".venv" }

[tasks.install]
run = "uv sync --all-groups --all-extras ${CI:+--locked}"
alias = "i"
description = "Install dependencies (alias: 'i'); asserts the lockfile with --locked under CI"

[tasks."install:upgrade"]
run = ["mise run install --upgrade", "uvx prek update"]
description = "Upgrade dependencies in the allowed ranges"

[tasks."install:check"]
run = ["uv tree --outdated --all-groups --depth 1", "uvx prek update --dry-run"]
description = "Check dependencies for updates"

[tasks.setup]
run = ["mise run install", "uvx prek install"]
description = "Setup the project"

[tasks.lint]
depends = ["install"]
run = "uvx prek run --all-files"
description = "Run pre-commit hooks"

[tasks."lint:fix"]
depends = ["install"]
run = "uvx prek run --all-files || true"
description = "Run pre-commit hooks, ignoring failures"

[tasks."test:unit:cli"]
run = "uv run pytest tests/unit/cli"
description = "Run CLI unit tests"

[tasks."test:unit:client"]
run = "uv run pytest tests/unit/client"
description = "Run client unit tests"

[tasks."test:unit"]
depends = ["install"]
run = [{ task = "test:unit:cli" }, { task = "test:unit:client" }]
description = "Run all unit tests"

[tasks."test:e2e:cli"]
run = "uv run pytest tests/e2e/cli"
description = "Run e2e CLI tests"

[tasks."test:e2e:client"]
run = "uv run pytest tests/e2e/client"
description = "Run e2e client tests"

[tasks."test:e2e"]
depends = ["install"]
run = [{ task = "test:e2e:cli" }, { task = "test:e2e:client" }]
description = "Run all e2e tests"

[tasks."generate:client"]
run = "uv run bin/generate/client.py"
description = "Generate Immich API client"

[tasks."generate:cli"]
run = "uv run bin/generate/cli.py"
description = "Generate Immich CLI"

[tasks."docs:dev"]
run = "uv run zensical serve"
description = "Run documentation development server"

[tasks."docs:generate:cli"]
depends = ["install"]
run = "uv run typer immichpy/cli/main.py utils docs --name immichpy --output docs/cli/reference.md --title Reference"
description = "Generate CLI documentation"

[tasks."docs:generate:client"]
run = "uv run bin/docs/client.py"
description = "Generate client documentation"

[tasks."ci:gen"]
description = "Regenerate client, CLI, and docs, then stage and lint (set IMMICH_OPENAPI_REF to a git ref)"
run = [
    { task = "generate:cli" },
    { task = "generate:client" },
    { task = "docs:generate:cli" },
    { task = "docs:generate:client" },
    # Stage generated files so pre-commit (which only lints tracked files) picks up new ones
    "git add -A",
    { task = "lint:fix" },
]
